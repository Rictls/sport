html,body{height:100%;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,sans-serif;overflow-x:hidden}
body{display:flex;flex-direction:column}
.topbar{padding:52px 16px 10px;background:var(--bg);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.06)}

.progsel::-webkit-scrollbar{display:none}
.psbtn{padding:5px 11px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid var(--bd2);background:transparent;color:var(--tx2);cursor:pointer;white-space:nowrap;flex-shrink:0;letter-spacing:.2px}
.ptabs{display:flex;gap:6px;padding:10px 16px;background:var(--bg);border-bottom:0.5px solid var(--bd);overflow-x:auto}
.ptabs::-webkit-scrollbar{display:none}
.ptab{padding:7px 16px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid var(--bd2);color:var(--tx2);background:transparent;white-space:nowrap;cursor:pointer}

.jbtn{display:flex;flex-direction:column;align-items:center;padding:7px 8px;border-radius:var(--rs);border:1px solid var(--bd2);color:var(--tx2);background:var(--bg2);min-width:62px;max-width:80px;cursor:pointer}

.jmus{font-size:9px;opacity:.7;text-align:center;word-break:break-word;line-height:1.3;white-space:normal}
.page{flex:1;overflow-y:auto;padding:14px;padding-bottom:90px}
.page::-webkit-scrollbar{display:none}
.chip{font-size:12px;color:var(--tx2);background:var(--bg3);border:0.5px solid var(--bd);border-radius:20px;padding:4px 10px;display:inline-block;margin-bottom:12px}

.enum.dn{background:var(--gn);color:#fff}
.einf{flex:1;min-width:0}
.enm{font-size:14px;font-weight:600;line-height:1.3}

.ex-col{display:flex;flex-direction:column;align-items:center;gap:2px}

function gPh(){return cProg===0?PHASES:cProg===1?CB.phases:cProg===2?SZ.phases:BG.phases;}

function nbS(r){var m=r.match(/^(\d+)/);return m?parseInt(m[1]):1;}
function fmtT(s){var m=Math.floor(s/60),sc=s%60;return m+":"+(sc<10?"0":"")+sc;}
function fmtRL(s){if(s>=60)return Math.floor(s/60)+"min"+(s%60?s%60+"s":"");return s+"sec";}
function sk(p,j,e,s){return p+"_"+j+"_"+e+"_"+s;}
function kk(p,j,e,s,slot){return "k_"+p+"_"+j+"_"+e+"_"+s+(slot?"_"+slot:"");}
function rk(p,j,e,s,slot){return "r_"+p+"_"+j+"_"+e+"_"+s+(slot?"_"+slot:"");}
function tk(p,j,e){return p+"_"+j+"_"+e;}

// ================================================================
// DETECTION DES SLOTS (colonnes reps+kg par serie)
// Priorite 1 : format (A+B+C) dans le champ r
// Priorite 2 : tags de l exercice (DROPSET, BISET, SUPERSET, TRISET...)
// ================================================================
// getSlots : detecte la configuration de base d un exercice
// lastOnly = true si la technique ne s applique qu a la derniere serie
function getSlots(ex){
  var r=ex.r, tags=ex.t||[];
  var tagsStr=tags.join(" ");
  var tagsUp=tagsStr.toUpperCase();

  // -- Priorite 1 : format explicite (A+B) ou (A+B+C) dans r --
  // Ces formats s appliquent a TOUTES les series
  var m=r.match(/\(([^)]+)\)/);
  if(m){
    var inner=m[1];
    var parts=inner.split("+");
    if(parts.length>=2){
      var n=Math.min(parts.length,3);
      var labels=parts.slice(0,n).map(function(p,i){
        var clean=p.trim().replace(/[^0-9\-xMa]/g,"").substring(0,7)||"?";
        return {rep:clean, lbl:"Exo "+(i+1)};
      });
      return {n:n, slots:labels, mode:"multi", lastOnly:false};
    }
  }

  // -- Priorite 2 : tags --
  // Detecte si la technique est sur "derniere serie" seulement
  var lastOnly=/derniere serie|last serie|serie finale|series 4|serie 4|series 3-4|2 dernieres/i.test(tagsStr);

  // TRISET / GIANT SET -> 3 colonnes
  if(/TRISET|GIANT SET/.test(tagsUp)){
    return {n:3, slots:[
      {rep:repFromR(r,0),lbl:"Exo 1"},
      {rep:repFromR(r,1),lbl:"Exo 2"},
      {rep:repFromR(r,2),lbl:"Exo 3"}
    ], mode:"multi", lastOnly:false};
  }

  // BISET / SUPERSET -> 2 colonnes
  if(/BISET|SUPERSET/.test(tagsUp)){
    return {n:2, slots:[
      {rep:repFromR(r,0),lbl:"Exo 1"},
      {rep:repFromR(r,1),lbl:"Exo 2"}
    ], mode:"multi", lastOnly:false};
  }

  // DROPSET -> 2 colonnes, mais souvent sur derniere serie seulement
  if(/DROPSET/.test(tagsUp)){
    var reps=repFromR(r,0);
    return {n:2, slots:[
      {rep:reps, lbl:"Serie"},
      {rep:"drop", lbl:"Drop"}
    ], mode:"drop", lastOnly:lastOnly};
  }

  // CLUSTER -> 2 colonnes
  if(/CLUSTER/.test(tagsUp)){
    var reps=repFromR(r,0);
    return {n:2, slots:[
      {rep:reps, lbl:"Bloc 1"},
      {rep:reps, lbl:"Bloc 2"}
    ], mode:"cluster", lastOnly:false};
  }

  // FST-7, REST-PAUSE, simple -> 1 colonne
  return {n:1, slots:[{rep:repFromR(r,0), lbl:""}], mode:"single", lastOnly:false};
}

// Retourne le mode de slots effectif pour une serie donnee (s=index 0-based)
// Tient compte de lastOnly et des overrides manuels de l utilisateur
function getSlotsForSerie(ex, ei, s, nb){
  var base=getSlots(ex);
  var overKey="ov_"+cProg+"_"+cP+"_"+cJ+"_"+ei+"_"+s;
  // Override manuel de l utilisateur
  if(typeof oV[overKey]!=="undefined") return oV[overKey];
  // lastOnly : colonne supplementaire seulement sur la derniere serie
  if(base.lastOnly && s < nb-1){
    return {n:1, slots:[{rep:base.slots[0].rep, lbl:""}], mode:"single"};
  }
  return base;
}

// Extrait les reps cibles pour un slot (index 0-based)
function repFromR(r,idx){
  // Format avec parentheses : (10+12+15)
  var m=r.match(/\(([^)]+)\)/);
  if(m){
    var parts=m[1].split("+");
    if(idx<parts.length)
      return parts[idx].trim().replace(/[^0-9\-xMa\/]/g,"").substring(0,8)||"?";
  }
  // Format "NxREPS" ex: "4x10-10-8-6" -> pour idx>0 on prend le bon segment
  var mx=r.match(/^[\dx]+x(.+)/i)||r.match(/x(.+)/);
  if(mx){
    var rpart=mx[1].trim();
    // Peut contenir des series differentes ex: "10-10-8-6" (serie 1=10, serie 2=10, ...)
    // mais idx ici c est le slot d exercice, pas le numero de serie
    // Pour un exo simple, on retourne toute la partie reps
    return rpart.replace(/[^0-9\-xMa\s]/g,"").trim().substring(0,8)||"?";
  }
  var ms=r.match(/(\d+)\s*[sx]/i);
  return ms?ms[1]:"?";
}

function buildRecap(){
  var d=RECAP_DATA[cProg]||RECAP_DATA[0];
  var sh="<div class=\"stgrid\">";
  d.stats.forEach(function(s){sh+="<div class=\"stc\"><div class=\"stn\" style=\"color:"+s.c+"\">"+s.n+"</div><div class=\"stl\">"+s.l+"</div></div>";});
  sh+="</div>";
  d.sections.forEach(function(sec){
    sh+="<div class=\"seclbl\">"+sec.lbl+"</div>";
    if(sec.cards){sec.cards.forEach(function(c){sh+="<div class=\"rcard\"><div class=\"rch\">"+c.h+"</div><div class=\"rcb\">"+c.b+"</div></div>";});}
    if(sec.rows){
      sh+="<div class=\"rcard\"><div class=\"rcb\">";
      sec.rows.forEach(function(r){sh+="<div class=\"rrow\"><span>"+r[0]+"</span><span"+(r[2]?" style=\"color:"+r[2]+"\"":"")+">"+r[1]+"</span></div>";});
      sh+="</div></div>";
    }
  });
  document.getElementById("pg-recap").innerHTML=sh;
}

function setProg(p){
  cProg=p;cP=0;cJ=0;oC={};oV={};
  var titles=["PRO MASS EVOLUTION","CLASSIC BEAST","SHREDZ - SECHE 12 SEMAINES","BACK IN THE GAME"];
  var pscols=["#3b82f6","#6d28d9","#cc0000","#5b21b6"];
  document.getElementById("prog-title").textContent=titles[p];
  var ids=["ps0","ps1","ps2","ps3"];
  for(var i=0;i<4;i++){
    var btn=document.getElementById(ids[i]);
    if(!btn)continue;
    btn.style.background=p===i?pscols[i]:"transparent";
    btn.style.color=p===i?"#fff":"var(--tx2)";
    btn.style.borderColor=p===i?pscols[i]:"var(--bd2)";
  }
  setPhase(0);
}

function setPhase(p){
  cP=p;cJ=0;oC={};
  var phs=gPh();
  var cols=[];
  for(var i=0;i<phs.length;i++){cols.push(phs[i].cl);}
  var h="";
  for(var i=0;i<phs.length;i++){
    var nm=phs[i].nm.split(" - ")[0];
    var act=i===p;
    h+="<button class=\"ptab\" id=\"pt"+i+"\"";
    if(act){h+=" style=\"background:"+cols[p]+";color:#fff;border-color:"+cols[p]+"\">";}
    else{h+=">";}
    h+=nm+"</button>";
  }
  document.getElementById("ptabs").innerHTML=h;
  document.getElementById("tsub").textContent=phs[p].nm+" - "+phs[p].sm;
  buildJours();buildSeance();
}

function buildJours(){
  var ph=gPh()[cP],h="";
  for(var i=0;i<ph.jours.length;i++){
    var j=ph.jours[i],a=i===cJ;
    var st=a?"background:"+ph.cl+";border-color:"+ph.cl+";color:#fff":"";
    h+="<div class=\"jbtn\" id=\"jb"+i+"\" style=\""+st+"\"><span class=\"jday\">"+j.nm+"</span><span class=\"jmus\">"+j.ms.replace(/\n/g,"<br>")+"</span></div>";
  }
  document.getElementById("jnav").innerHTML=h;
}

function setJour(j){cJ=j;oC={};buildJours();buildSeance();}

function buildSeance(){
  var ph=gPh()[cP],j=ph.jours[cJ];
  document.getElementById("chip").textContent=j.inf;
  var done=true;
  for(var ei=0;ei<j.ex.length;ei++){
    var ex=j.ex[ei];
    if(ex.rp===0)continue;
    var nb=nbS(ex.r),nd=0;
    for(var s=0;s<nb;s++){if(sD[sk(cP,cJ,ei,s)])nd++;}
    if(nd<nb){done=false;break;}
  }
  document.getElementById("dban").style.display=done?"block":"none";
  var h="";
  for(var ei=0;ei<j.ex.length;ei++){h+=buildEx(j.ex[ei],ei,ph.cl);}
  document.getElementById("exlist").innerHTML=h;
}

function buildEx(ex,ei,col){
  var ic=ex.rp===0,nb=ic?0:nbS(ex.r),nd=0;
  for(var s=0;s<nb;s++){if(sD[sk(cP,cJ,ei,s)])nd++;}
  var ad=!ic&&nd>=nb,inp=!ic&&nd>0&&nd<nb;
  var op=!!oC[ei];
  var t=TM[tk(cP,cJ,ei)]||{rem:ex.rp,max:ex.rp,run:false};
  var pct=t.max>0?Math.round(t.rem/t.max*100):100;
  var tc=t.rem<=0?"tgo":t.rem<=15?"trd":t.rem<=30?"tor":"tgn";
  var pc=t.rem<=0?"#22c55e":t.rem<=15?"#ef4444":t.rem<=30?"#f97316":"#22c55e";
  var sh="";
  if(!ic){
    var baseSlots=getSlots(ex);
    sh="<div class=\"slbl\">Series</div><div class=\"sgrid\">";
    for(var s=0;s<nb;s++){
      var done=!!sD[sk(cP,cJ,ei,s)];
      var cur=!done&&nd===s;
      var dotSt=cur?"border-color:"+col+";color:"+col+";border-width:2px":"";
      var slots=getSlotsForSerie(ex,ei,s,nb);
      sh+="<div class=\"sit\">";
      sh+="<div class=\"sdot"+(done?" dn":"")+"\" id=\"sd_"+ei+"_"+s+"\" style=\""+dotSt+"\">"+(done?"&#10003;":(s+1))+"</div>";
      if(slots.n===1){
        var rv=rD[rk(cP,cJ,ei,s,"")]||slots.slots[0].rep;
        var kv=kD[kk(cP,cJ,ei,s,"")]||"";
        sh+="<div class=\"sit-inner\">";
        sh+="<input class=\"kgi ri"+(done?" gn":"")+"\" id=\"ri_"+ei+"_"+s+"\" type=\"text\" inputmode=\"decimal\" placeholder=\"reps\" value=\""+rv+"\">";
        sh+="<input class=\"kgi"+(done?" gn":"")+"\" id=\"ki_"+ei+"_"+s+"\" type=\"text\" inputmode=\"decimal\" placeholder=\"kg\" value=\""+kv+"\">";
        sh+="<span class=\"kglb\">reps/kg</span>";
        var bm=baseSlots.mode;
        var tl=bm==="drop"?"+Drop":bm==="multi"?"+Multi":bm==="cluster"?"+Cluster":"+Drop";
        sh+="<button class=\"tog-btn\" id=\"tog_"+ei+"_"+s+"\">"+tl+"</button>";
        sh+="</div>";
      } else {
        sh+="<div class=\"ex-cols\">";
        for(var sl=0;sl<slots.n;sl++){
          if(sl>0)sh+="<div class=\"ex-divider\"></div>";
          var slInfo=slots.slots[sl];
          var rv2=rD[rk(cP,cJ,ei,s,sl)]||slInfo.rep;
          var kv2=kD[kk(cP,cJ,ei,s,sl)]||"";
          sh+="<div class=\"ex-col\">";
          sh+="<span class=\"ex-col-lbl\">"+slInfo.lbl+"</span>";
          sh+="<input class=\"kgi ri"+(done?" gn":"")+"\" id=\"ri_"+ei+"_"+s+"_"+sl+"\" type=\"text\" inputmode=\"decimal\" placeholder=\"reps\" value=\""+rv2+"\">";
          sh+="<input class=\"kgi"+(done?" gn":"")+"\" id=\"ki_"+ei+"_"+s+"_"+sl+"\" type=\"text\" inputmode=\"decimal\" placeholder=\"kg\" value=\""+kv2+"\">";
          sh+="<span class=\"kglb\">reps/kg</span>";
          sh+="</div>";
        }
        sh+="</div>";
        var tl2=slots.mode==="drop"?"-Drop":slots.mode==="cluster"?"-Cluster":"-Biset";
        sh+="<button class=\"tog-btn act\" id=\"tog_"+ei+"_"+s+"\">"+tl2+"</button>";
      }
      sh+="</div>";
    }
    sh+="</div>";
  }
  var th="";
  if(!ic){
    th="<div class=\"tbox\">";
    th+="<div class=\"tlbl\">Repos - "+fmtRL(ex.rp)+"</div>";
    th+="<div class=\"tdisp "+tc+"\" id=\"td_"+ei+"\">"+(t.rem<=0?"GO!":fmtT(t.rem))+"</div>";
    th+="<div class=\"pbw\"><div class=\"pb\" id=\"pb_"+ei+"\" style=\"width:"+pct+"%;background:"+pc+"\"></div></div>";
    th+="<div class=\"tbtns\">";
    th+="<button class=\"tbtn\" id=\"ts_"+ei+"\" style=\"background:"+col+";border-color:"+col+";color:#fff\">"+(t.run?"&#9208; Pause":"&#9654; Start")+"</button>";
    th+="<button class=\"tbtn\" id=\"tr_"+ei+"\">&#8634;</button>";
    th+="<button class=\"tbtn\" id=\"ta30_"+ei+"\">+30s</button>";
    th+="<button class=\"tbtn\" id=\"tm15_"+ei+"\">-15s</button>";
    th+="</div><div class=\"tpre\">";
    th+="<button class=\"tpb\" id=\"tp45_"+ei+"\">45s</button>";
    th+="<button class=\"tpb\" id=\"tp60_"+ei+"\">1min</button>";
    th+="<button class=\"tpb\" id=\"tp90_"+ei+"\">1m30</button>";
    th+="<button class=\"tpb\" id=\"tp120_"+ei+"\">2min</button>";
    th+="<button class=\"tpb\" id=\"tp180_"+ei+"\">3min</button>";
    th+="</div></div>";
  }
  var cls="exc"+(ad?" cmp":inp?" inp":"");
  return "<div class=\""+cls+"\">"
    +"<div class=\"exh\" id=\"exh_"+ei+"\">"
    +"<div class=\"enum"+(ad?" dn":"")+"\">"+(ad?"&#10003;":(ei+1))+"</div>"
    +"<div class=\"einf\"><div class=\"enm\">"+ex.n+"</div><div class=\"erp\" style=\"color:"+col+"\">"+ex.r+"</div></div>"
    +"<div class=\"echv\" id=\"chv_"+ei+"\" style=\"transform:"+(op?"rotate(180deg)":"rotate(0)")+"\">&#8964;</div>"
    +"</div>"
    +"<div class=\"ebody"+(op?" op":"")+"\" id=\"eb_"+ei+"\">"
    +"<div class=\"enotes\">"+ex.d+"</div>"
    +"<div class=\"bgs\">"+ex.t.map(function(b){return "<span class=\"bg\">"+b+"</span>";}).join("")+"</div>"
    +sh+th
    +"</div></div>";
}

function updT(ei){
  var t=TM[tk(cP,cJ,ei)];
  if(!t)return;
  var el=document.getElementById("td_"+ei);
  var pb=document.getElementById("pb_"+ei);
  var ts=document.getElementById("ts_"+ei);
  if(!el)return;
  if(t.rem<=0){el.textContent="GO!";el.className="tdisp tgo";}
  else{el.textContent=fmtT(t.rem);el.className="tdisp "+(t.rem<=15?"trd":t.rem<=30?"tor":"tgn");}
  if(pb){pb.style.width=(t.max>0?Math.round(t.rem/t.max*100):0)+"%";pb.style.background=t.rem<=0?"#22c55e":t.rem<=15?"#ef4444":t.rem<=30?"#f97316":"#22c55e";}
  if(ts)ts.innerHTML=t.run?"&#9208; Pause":"&#9654; Start";
}

function startTimer(ei,def){
  var key=tk(cP,cJ,ei);
  if(!TM[key])TM[key]={rem:def,max:def,run:false,iv:null};
  var t=TM[key];
  if(t.run){clearInterval(t.iv);t.run=false;updT(ei);return;}
  if(t.rem<=0){t.rem=def;t.max=def;}
  t.run=true;
  t.iv=setInterval(function(){
    t.rem--;
    if(t.rem<=0){t.rem=0;clearInterval(t.iv);t.run=false;}
    updT(ei);
  },1000);
  updT(ei);
}

function toggleSerie(ei,si){
  var key=sk(cP,cJ,ei,si);
  sD[key]=!sD[key];
  oC[ei]=true;
  var ex=gPh()[cP].jours[cJ].ex[ei];
  var nb=nbS(ex.r),nd=0;
  for(var s=0;s<nb;s++){if(sD[sk(cP,cJ,ei,s)])nd++;}
  if(nd>0&&nd<nb)startTimer(ei,ex.rp);
  buildSeance();
}

document.addEventListener("click",function(e){
  // Remonter l arbre DOM pour trouver l element cliquable avec un id
  var el=e.target;
  var id="";
  while(el&&el!==document.body){
    if(el.id){id=el.id;break;}
    el=el.parentNode;
  }
  if(!id)return;
  if(id==="ps0"){setProg(0);return;}
  if(id==="ps1"){setProg(1);return;}
  if(id==="ps2"){setProg(2);return;}
  if(id==="ps3"){setProg(3);return;}
  if(id==="bn0"){showTab("prog");return;}
  if(id==="bn1"){showTab("recap");return;}
  var m;
  m=id.match(/^pt(\d+)$/);if(m){setPhase(parseInt(m[1]));return;}
  m=id.match(/^jb(\d+)$/);if(m){setJour(parseInt(m[1]));return;}
  m=id.match(/^sd_(\d+)_(\d+)$/);if(m){toggleSerie(parseInt(m[1]),parseInt(m[2]));return;}
  m=id.match(/^ts_(\d+)$/);if(m){var ei=parseInt(m[1]);startTimer(ei,gPh()[cP].jours[cJ].ex[ei].rp);return;}
  m=id.match(/^tr_(\d+)$/);if(m){
    var ei=parseInt(m[1]),def=gPh()[cP].jours[cJ].ex[ei].rp,key=tk(cP,cJ,ei);
    if(TM[key]&&TM[key].iv)clearInterval(TM[key].iv);
    TM[key]={rem:def,max:def,run:false,iv:null};buildSeance();return;
  }
  m=id.match(/^ta30_(\d+)$/);if(m){
    var ei=parseInt(m[1]),key=tk(cP,cJ,ei);
    if(TM[key]){TM[key].rem=Math.min(TM[key].rem+30,599);TM[key].max=Math.max(TM[key].max,TM[key].rem);updT(ei);}return;
  }
  m=id.match(/^tm15_(\d+)$/);if(m){
    var ei=parseInt(m[1]),key=tk(cP,cJ,ei);
    if(TM[key]){TM[key].rem=Math.max(0,TM[key].rem-15);updT(ei);}return;
  }
  m=id.match(/^tp(\d+)_(\d+)$/);if(m){
    var val=parseInt(m[1]),ei=parseInt(m[2]),key=tk(cP,cJ,ei);
    if(TM[key]&&TM[key].iv)clearInterval(TM[key].iv);
    TM[key]={rem:val,max:val,run:false,iv:null};buildSeance();return;
  }
  // Bouton toggle technique par serie
  m=id.match(/^tog_(\d+)_(\d+)$/);if(m){
    var ei=parseInt(m[1]),si=parseInt(m[2]);
    var ovKey="ov_"+cProg+"_"+cP+"_"+cJ+"_"+ei+"_"+si;
    var ex=gPh()[cP].jours[cJ].ex[ei];
    var nb=nbS(ex.r);
    var current=getSlotsForSerie(ex,ei,si,nb);
    if(current.n===1){
      // Activer la technique de base sur cette serie
      var base=getSlots(ex);
      oV[ovKey]=base; // force mode multi
    } else {
      // Desactiver : retour a simple
      oV[ovKey]={n:1, slots:[{rep:current.slots[0].rep, lbl:""}], mode:"single"};
    }
    buildSeance();return;
  }
},false);

document.addEventListener("click",function(e){
  var el=e.target;
  while(el&&el!==document.body){
    if(el.id&&el.id.match(/^exh_(\d+)$/)){
      var ei=parseInt(el.id.match(/^exh_(\d+)$/)[1]);
      oC[ei]=!oC[ei];buildSeance();return;
    }
    el=el.parentNode;
  }
},true);

document.addEventListener("input",function(e){
  var el=e.target;
  if(el&&el.id){
    var id=el.id;
    // kg simple: ki_ei_s
    var m=id.match(/^ki_(\d+)_(\d+)$/);
    if(m){kD[kk(cP,cJ,parseInt(m[1]),parseInt(m[2]),"")]=el.value;return;}
    // kg multi: ki_ei_s_slot
    m=id.match(/^ki_(\d+)_(\d+)_(\d+)$/);
    if(m){kD[kk(cP,cJ,parseInt(m[1]),parseInt(m[2]),parseInt(m[3]))]=el.value;return;}
    // reps simple: ri_ei_s
    m=id.match(/^ri_(\d+)_(\d+)$/);
    if(m){rD[rk(cP,cJ,parseInt(m[1]),parseInt(m[2]),"")]=el.value;return;}
    // reps multi: ri_ei_s_slot
    m=id.match(/^ri_(\d+)_(\d+)_(\d+)$/);
    if(m){rD[rk(cP,cJ,parseInt(m[1]),parseInt(m[2]),parseInt(m[3]))]=el.value;return;}
  }
},false);

setProg(0);

</script>
